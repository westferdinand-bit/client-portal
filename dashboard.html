Before calling, spend 5–10 minutes on Google Maps finding real problems with their listing. Then open with this:

"Hey [Name], before I even pitched you anything I pulled up your Google listing and found a few things that are costing you customers right now — can I share them real quick?"

WHAT TO LOOK FOR (takes 5 mins on Google Maps):
• Missing or outdated business hours
• No photos or low-quality photos
• Under 10 Google reviews (or no recent ones)
• No response to existing reviews
• Website link missing or broken
• Business description empty or generic

WHY IT WORKS:
You show up knowing their business before the call. They immediately see you as an expert, not a salesperson. And it's 100% free — you're just using Google.

CLOSE WITH:
"I can fix all of this as part of your onboarding. Takes me about 20 minutes and it's included when you start today."`},gbp_optimization:{label:`📍 Free GBP Bonus`,safe:!0,content:`WHAT IT IS:
Google Business Profile (GBP) optimization — making their Google listing look better so they show up higher in local search.

COST TO YOU: ~20 minutes. Zero dollars.
VALUE TO THEM: $200–$500 one-time if they hired someone else.

WHAT YOU DO:
1. Add/update all business categories
2. Write a keyword-rich business description
3. Add all services with descriptions
4. Upload 10–15 high-quality photos
5. Set correct hours (including holidays)
6. Add Q&A section with common questions
7. Respond to any existing reviews

HOW TO OFFER IT:
"I'm going to optimize your full Google listing as part of your setup — most businesses see more calls within 2 weeks just from this alone. It's included when you start today."

WHEN TO USE IT:
Offer this as a bonus on every new sign-up. It takes you 20 minutes, they see immediate results, and it makes them sticky — they won't cancel because you already improved something visible.`},lock_in_rate:{label:`🔒 Lock-In Rate Close`,safe:!0,content:`WHEN TO USE:
When they're interested but dragging their feet. Works great at the end of a call.

THE LINE:
"I'm still building my client base here in Manhattan, so I'm keeping the price at $297 for my first 10 clients. Once those spots are filled I'm moving to $397. You'd be locked in at $297 forever — even when I raise rates."

WHY IT WORKS:
• Creates real urgency without fake pressure
• You're being honest — you ARE building up
• $100/mo savings feels tangible
• "Forever" is a powerful word

IMPORTANT:
Only say this if you mean it. When you hit 10 clients, actually raise the rate for new clients. This builds credibility and keeps early clients feeling like they got a deal.`},referral_bonus:{label:`🤝 Referral Close`,safe:!0,content:`THE OFFER:
"If you refer another business owner to me and they sign up, I'll give you one free month. That's $297 back in your pocket just for making an introduction."

COST TO YOU:
One month of service (~$30–50 in actual costs). Worth it because:
→ You gain a $297/mo recurring client
→ Referred clients close at 3–5x higher rates
→ Your existing client becomes invested in your success

HOW TO BRING IT UP:
Do NOT mention this on the first call. Wait until they've been a client for 2–4 weeks and seen results. Then text them:

"Hey [Name]! Hope the system's been working well for you. Quick thing — if you know any other business owners in Manhattan who'd benefit from this, I'll give you a free month for every one that signs up. Just an intro text is all it takes 🙌"

PRO TIP:
The best referral sources are barbers, nail salons, and restaurant owners — they talk to dozens of local business owners every week.`},money_back:{label:`💯 30-Day Guarantee`,safe:!0,content:`THE LINE:
"If you're not happy with the system in the first 30 days for any reason, I'll refund you in full. No questions asked."

COST TO YOU:
Virtually nothing. If the system works (it will), nobody asks for a refund.

WHEN TO USE IT:
Only when someone is clearly interested but nervous about risk. Don't lead with it — save it as a final closer.

"Look — you said no contract, I got you. You said you're busy, I handle everything. The only thing left is wondering if it'll actually work for your business. So here's what I'll do: try it for 30 days. If it doesn't pay for itself, I'll give you every dollar back. That's how confident I am."

WHY IT'S SAFE:
Your actual cost per client is $30–50/mo. Even if 1 in 10 clients refunds, you're still profitable across the board. And most won't — they'll see results.`},demo_close:{label:`📱 Live Demo Close`,safe:!0,content:`THE MOST POWERFUL CLOSE YOU HAVE — USE IT EVERY TIME.

HOW IT WORKS:
While you're on the phone or in person with them, say:

"Give me your cell number. I'm going to call it right now and hang up — watch what happens."

Then call their number from your Twilio demo line and hang up. Within seconds they get a text:

"Hey! Sorry we missed your call — how can we help you? We'll get right back to you!"

WHAT HAPPENS:
They see it work in real time on their own phone. No pitch needed. The product sells itself.

SETUP:
Make sure your Twilio test number is configured and ready before any sales call. This is your #1 closing tool.
