"Hey, is this [Owner Name]? Hey [Name], this is Ferdinand — I'm not trying to sell you anything crazy, I promise I'll keep this under 60 seconds.

I work with local businesses here in Manhattan helping them stop missing calls and losing customers. Quick question — when you're with a customer and someone else calls and you can't pick up, what happens to that person?

[Let them answer]

Yeah, that's exactly what I figured. What I do is set up a simple system so when you miss a call, that customer automatically gets a text from YOUR number within seconds saying you're busy and asking how you can help. Keeps the lead warm instead of them calling your competitor down the street.

[If they say they're busy]

[If yes or they engage]
"Totally get it. I help local Manhattan businesses set up a system that automatically texts back anyone who calls and you can't pick up — keeps them from going to the next person on Google. Takes 20 mins to set up, $297/mo, no contract. Want me to show you how it works real quick?"

[If no reply after 2 days]
"Hey [Name]! Just following up. Happy to send a quick 2-min breakdown showing exactly how it works if that's easier 🙌"`},facebook_dm:{label:"📘 Facebook DM",content:`[First message]
"Hi [Name]! I came across [Business Name] on Facebook and wanted to reach out. I help local Manhattan businesses stop losing customers when they miss calls — it's a simple automated text-back system.

Curious — how do you currently handle it when a customer calls and you're not able to pick up?"

[Wait for reply]

[Follow up]
"Got it. The system I set up sends them an automatic text from your number within seconds of the missed call — so they stay engaged instead of moving on. It's $297/mo, no long-term contract, and I set everything up for you. Want to jump on a quick 10-min call this week?"`},objections:{label:"🛡️ Objections",content:`"I'm not interested"

"I already have something like that"
→ "Oh nice! What are you using? [Listen] Yeah, I know that one. The difference with mine is it's simpler, cheaper, and there's no contract. Are you happy with it or open to a quick comparison?"

"How do I know it works?"
→ "Fair question. I can do a live demo in 10 minutes — I'll call your number and you'll see exactly what your customers receive. No commitment at all."

"$297 is too much"
→ "I get it. If this system saves you even ONE job a month, most businesses make that back 3–5x. Want to try it 30 days and see? Cancel if it doesn't pay for itself."

Before calling, spend 5–10 minutes on Google Maps finding real problems with their listing. Then open with this:

• Missing or outdated business hours
• No photos or low-quality photos
• Under 10 Google reviews (or no recent ones)
• No response to existing reviews
• Website link missing or broken
• Business description empty or generic

You show up knowing their business before the call. They immediately see you as an expert, not a salesperson. And it's 100% free — you're just using Google.
