<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Business Dashboard — Boroughwest Digital</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f3f4f6; margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .b1{animation:bounce 1s infinite;}
    .b2{animation:bounce 1s infinite 0.12s;}
    .b3{animation:bounce 1s infinite 0.24s;}
    .b4{animation:bounce 1s infinite 0.36s;}
    .b5{animation:bounce 1s infinite 0.48s;}
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .fade-up { animation: fadeUp 0.5s ease forwards; }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-card { border-radius: 14px; padding: 14px; }
    .card { background: #fff; border-radius: 18px; border: 1px solid #f0f0f0; box-shadow: 0 1px 4px rgba(0,0,0,0.06); padding: 18px; margin-bottom: 14px; }
    .card-label { font-size: 10px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
    .service-row { display: flex; align-items: flex-start; gap: 12px; padding: 11px 0; border-bottom: 1px solid #f9fafb; }
    .service-row:last-child { border-bottom: none; }
    .service-dot { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; font-size: 11px; font-weight: 700; }
    .revenue-banner { border-radius: 14px; padding: 16px; text-align: center; color: #fff; background: linear-gradient(135deg, #1e3a5f, #2563eb); margin-top: 12px; }
    .header-wrap { background: #1e3a5f; color: #fff; padding: 20px 16px 18px; }
    .header-inner { max-width: 600px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .header-logo { width: 44px; height: 44px; background: #3b82f6; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; flex-shrink: 0; color: #fff; }
    .content-wrap { max-width: 600px; margin: 0 auto; padding: 16px 14px 32px; }
    .stat-icon { font-size: 22px; margin-bottom: 6px; }
    .stat-value { font-size: 26px; font-weight: 800; line-height: 1; }
    .stat-label { font-size: 11px; color: #6b7280; margin-top: 4px; line-height: 1.3; }
    .footer-note { text-align: center; padding-bottom: 12px; }
    .splash-inner { text-align: center; color: #fff; padding: 0 28px; max-width: 380px; }
    .splash-emoji { font-size: 64px; margin-bottom: 16px; }
    .splash-title { font-size: 28px; font-weight: 800; margin-bottom: 8px; line-height: 1.2; }
    .splash-biz { font-size: 17px; color: #bfdbfe; }
    .splash-sub { font-size: 13px; color: #93c5fd; margin-top: 10px; line-height: 1.5; }
    .splash-emojis { margin-top: 22px; display: flex; justify-content: center; gap: 14px; font-size: 24px; }
    @media (max-width: 360px) {
      .stat-value { font-size: 22px; }
      .splash-title { font-size: 24px; }
      .stat-card { padding: 12px; }
      .card { padding: 14px; }
    }
  </style>
</head>
<body>
  <canvas id="confetti" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:50;"></canvas>

  <div id="splash" style="position:fixed;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 100%);transition:opacity 0.7s;">
    <div class="splash-inner">
      <div class="splash-emoji b1">🎉</div>
      <div class="splash-title">Welcome aboard!</div>
      <div class="splash-biz" id="splash-name"></div>
      <div class="splash-sub">Your business automation is live and ready to grow your business 🚀</div>
      <div class="splash-emojis">
        <span class="b1">🎊</span><span class="b2">✨</span><span class="b3">🎉</span><span class="b4">✨</span><span class="b5">🎊</span>
      </div>
    </div>
  </div>

  <div id="main" style="opacity:0;transition:opacity 0.7s;">
    <div class="header-wrap">
      <div class="header-inner">
        <div>
          <div style="font-size:10px;color:#93c5fd;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;">Business Dashboard</div>
          <div id="biz-name" style="font-size:18px;font-weight:800;line-height:1.2;">Loading...</div>
          <div style="font-size:12px;color:#bfdbfe;margin-top:3px;">Powered by Boroughwest Digital</div>
        </div>
        <div class="header-logo">BW</div>
      </div>
    </div>
    <div class="content-wrap" id="content">
      <div style="text-align:center;padding:48px 0;color:#9ca3af;font-size:14px;">Loading your dashboard...</div>
    </div>
  </div>

  <script>
    const COLORS=['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#f97316'];
    const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
    function rand(a,b){return a+Math.random()*(b-a);}

    function launchConfetti(){
      const canvas=document.getElementById('confetti');
      const dpr=window.devicePixelRatio||1;
      canvas.width=window.innerWidth*dpr;
      canvas.height=window.innerHeight*dpr;
      canvas.style.width=window.innerWidth+'px';
      canvas.style.height=window.innerHeight+'px';
      const ctx=canvas.getContext('2d');
      ctx.scale(dpr,dpr);
      const W=window.innerWidth,H=window.innerHeight;
      const particles=Array.from({length:180},()=>({
        x:rand(0,W),y:rand(-130,-5),r:rand(5,13),
        color:COLORS[Math.floor(Math.random()*COLORS.length)],
        speed:rand(2,5.5),angle:rand(-0.4,0.4),spin:rand(-0.12,0.12),
        rotation:rand(0,Math.PI*2),shape:Math.random()>0.5?'rect':'circle',opacity:1
      }));
      let frame=0;
      function draw(){
        ctx.clearRect(0,0,W,H);
        let active=false;
        particles.forEach(p=>{
          p.y+=p.speed;p.x+=p.angle;p.rotation+=p.spin;
          if(frame>70)p.opacity=Math.max(0,p.opacity-0.014);
          if(p.opacity>0)active=true;
          ctx.save();ctx.globalAlpha=p.opacity;
          ctx.translate(p.x,p.y);ctx.rotate(p.rotation);ctx.fillStyle=p.color;
          if(p.shape==='rect'){ctx.fillRect(-p.r/2,-p.r/4,p.r,p.r/2);}
          else{ctx.beginPath();ctx.arc(0,0,p.r/2,0,Math.PI*2);ctx.fill();}
          ctx.restore();
        });
        frame++;
        if(active&&frame<220)requestAnimationFrame(draw);
        else ctx.clearRect(0,0,W,H);
      }
      requestAnimationFrame(draw);
    }

    function buildDashboard(client){
      const name=client.business_name||'Your Business';
      document.getElementById('biz-name').textContent=name;
      document.getElementById('splash-name').textContent=name;
      const month=MONTHS[new Date().getMonth()];
      const year=new Date().getFullYear();
      const stats=[
        {label:'Missed Calls Recovered',value:0,icon:'📞',color:'#2563eb',bg:'#eff6ff'},
        {label:'New Leads Captured',value:0,icon:'🎯',color:'#16a34a',bg:'#f0fdf4'},
        {label:'Reviews Generated',value:0,icon:'⭐',color:'#d97706',bg:'#fffbeb'},
        {label:'Referrals Converted',value:0,icon:'🤝',color:'#7c3aed',bg:'#f5f3ff'},
      ];
      const services=[
        {label:'Missed Call Text-Back',active:!!client.twilio_phone_number,desc:"Texts anyone who calls and doesn't get answered"},
        {label:'Facebook & Instagram Auto-Reply',active:!!(client.facebook_connected||client.instagram_connected),desc:'Instantly replies to DMs on your social pages'},
        {label:'Review Request System',active:true,desc:'Sends Google review requests to customers after service'},
        {label:'Referral Program',active:true,desc:'Tracks & rewards customers who send new business your way'},
        {label:'Monthly Reporting',active:true,desc:'You get a results update every single month'},
      ];
      document.getElementById('content').innerHTML=
        '<div class="card fade-up">'+
          '<div class="card-label">'+month+' '+year+' — Your Results</div>'+
          '<div class="stat-grid">'+
            stats.map(s=>'<div class="stat-card" style="background:'+s.bg+'"><div class="stat-icon">'+s.icon+'</div><div class="stat-value" style="color:'+s.color+'">'+s.value+'</div><div class="stat-label">'+s.label+'</div></div>').join('')+
          '</div>'+
          '<div class="revenue-banner"><div style="font-size:19px;font-weight:800;">Results Coming Soon 🚀</div><div style="font-size:12px;color:#bfdbfe;margin-top:4px;">Your stats will update after your first month</div></div>'+
        '</div>'+
        '<div class="card fade-up" style="animation-delay:0.1s">'+
          '<div class="card-label">What\'s Active For You</div>'+
          services.map(s=>'<div class="service-row"><div class="service-dot" style="background:'+(s.active?'#dcfce7':'#f3f4f6')+';color:'+(s.active?'#16a34a':'#9ca3af')+'">'+(s.active?'✓':'○')+'</div><div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:600;color:'+(s.active?'#111827':'#9ca3af')+';line-height:1.3;">'+s.label+'</div><div style="font-size:11px;color:#9ca3af;margin-top:2px;line-height:1.4;">'+s.desc+'</div></div></div>').join('')+
        '</div>'+
        '<div class="footer-note"><p style="color:#9ca3af;font-size:11px;margin:0 0 2px;">Questions? Contact Ferdinand at Boroughwest Digital</p><p style="color:#d1d5db;font-size:11px;margin:0;">Manhattan, NYC · Local Business Automation</p></div>';
    }

    // Boot
    launchConfetti();
    setTimeout(()=>{
      const sp=document.getElementById('splash');
      sp.style.opacity='0';
      setTimeout(()=>{sp.style.display='none';},700);
      document.getElementById('main').style.opacity='1';
    },3500);

    const params=new URLSearchParams(window.location.search);
    const clientId=params.get('client');
    if(!clientId){
      document.getElementById('splash-name').textContent='Demo Preview';
      buildDashboard({business_name:'Demo Business'});
    } else {
      fetch('https://base44.app/api/apps/6a1b5820c74ffab0eedd9b5a/entities/Client/filter',{
        method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:clientId})
      }).then(r=>r.json()).then(data=>{
        const list=Array.isArray(data)?data:(data.items||[]);
        const client=list[0];
        if(!client){buildDashboard({business_name:'Your Business'});return;}
        buildDashboard(client);
      }).catch(()=>buildDashboard({business_name:'Your Business'}));
    }
  </script>
</body>
</html>
