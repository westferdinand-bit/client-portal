<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Business Dashboard — Boroughwest Digital</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; padding: 0; background: #f4f6f9; font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .bounce  { animation: bounce 1s infinite; }
    .bounce2 { animation: bounce 1s infinite 0.15s; }
    .bounce3 { animation: bounce 1s infinite 0.3s; }
    .bounce4 { animation: bounce 1s infinite 0.45s; }
    .bounce5 { animation: bounce 1s infinite 0.6s; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .fade-in { animation: fadeIn 0.7s ease forwards; }
    #splash { position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 100%); }
    #main { display:none; }
  </style>
</head>
<body>

  <!-- Confetti Canvas -->
  <canvas id="confetti" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100;"></canvas>

  <!-- Welcome Splash -->
  <div id="splash">
    <div style="text-align:center;color:white;padding:32px 24px;max-width:320px;">
      <div style="font-size:56px;margin-bottom:16px;" class="bounce">🎉</div>
      <h1 style="font-size:26px;font-weight:800;margin:0 0 8px;">Welcome aboard!</h1>
      <p id="splash-name" style="color:#93c5fd;font-size:16px;margin:0 0 6px;"></p>
      <p style="color:#bfdbfe;font-size:13px;margin:0 0 20px;">Your automation is live and ready to grow your business 🚀</p>
      <div style="display:flex;justify-content:center;gap:12px;">
        <span style="font-size:22px;" class="bounce">🎊</span>
        <span style="font-size:22px;" class="bounce2">✨</span>
        <span style="font-size:22px;" class="bounce3">🎉</span>
        <span style="font-size:22px;" class="bounce4">✨</span>
        <span style="font-size:22px;" class="bounce5">🎊</span>
      </div>
    </div>
  </div>

  <!-- Main Dashboard -->
  <div id="main">
    <!-- Header -->
    <div style="background:linear-gradient(135deg,#1e3a5f,#2563eb);color:white;padding:20px 16px 24px;">
      <div style="max-width:480px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;">
        <div>
          <div style="font-size:10px;color:#93c5fd;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;">Business Dashboard</div>
          <h1 id="biz-name" style="font-size:20px;font-weight:800;margin:0 0 2px;">Loading...</h1>
          <p style="font-size:12px;color:#bfdbfe;margin:0;">Powered by Boroughwest Digital</p>
        </div>
        <div style="width:44px;height:44px;background:rgba(255,255,255,0.2);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <span style="font-weight:800;font-size:15px;">BW</span>
        </div>
      </div>
    </div>

    <!-- Content -->
    <div style="max-width:480px;margin:0 auto;padding:16px;" id="content"></div>
  </div>

  <script>
    const COLORS = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#f97316'];
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    // --- CONFETTI ---
    function launchConfetti() {
      const canvas = document.getElementById('confetti');
      const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
      resize();
      window.addEventListener('resize', resize);
      const ctx = canvas.getContext('2d');
      const particles = Array.from({length: 180}, () => ({
        x: Math.random() * canvas.width, y: Math.random() * -150 - 10,
        r: 5 + Math.random() * 9, color: COLORS[Math.floor(Math.random()*COLORS.length)],
        speed: 2.5 + Math.random() * 4, angle: (Math.random()-0.5)*0.8,
        spin: (Math.random()-0.5)*0.2, rotation: Math.random()*Math.PI*2,
        shape: Math.random()>0.5?'rect':'circle', opacity: 1
      }));
      let frame = 0;
      (function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        let alive = false;
        particles.forEach(p => {
          p.y += p.speed; p.x += p.angle; p.rotation += p.spin;
          if (frame > 90) p.opacity = Math.max(0, p.opacity - 0.012);
          if (p.opacity > 0) alive = true;
          ctx.save(); ctx.globalAlpha = p.opacity;
          ctx.translate(p.x, p.y); ctx.rotate(p.rotation);
          ctx.fillStyle = p.color;
          if (p.shape === 'rect') ctx.fillRect(-p.r/2, -p.r/4, p.r, p.r/2);
          else { ctx.beginPath(); ctx.arc(0,0,p.r/2,0,Math.PI*2); ctx.fill(); }
          ctx.restore();
        });
        frame++;
        if (alive && frame < 260) requestAnimationFrame(draw);
        else ctx.clearRect(0,0,canvas.width,canvas.height);
      })();
    }

    // --- BUILD DASHBOARD ---
    function buildDashboard(client) {
      const name = client.business_name || 'Your Business';
      document.getElementById('biz-name').textContent = name;
      document.getElementById('splash-name').textContent = name;

      const month = MONTHS[new Date().getMonth()];
      const year = new Date().getFullYear();
      const pkg = client.package || 'Starter';

      const stats = [
        { label:'Missed Calls Recovered', value: client.missed_calls || 0, icon:'📞', color:'#2563eb', bg:'#eff6ff' },
        { label:'New Leads Captured',     value: client.leads_count || 0,  icon:'🎯', color:'#16a34a', bg:'#f0fdf4' },
        { label:'Reviews Generated',      value: client.reviews || 0,      icon:'⭐', color:'#d97706', bg:'#fffbeb' },
        { label:'Referrals Converted',    value: client.referrals || 0,    icon:'🤝', color:'#7c3aed', bg:'#faf5ff' },
      ];

      const services = [
        { label:'Missed Call Text-Back',        active: !!client.twilio_phone_number,                    desc:"Auto-texts anyone who calls and doesn't get through" },
        { label:'Facebook & Instagram DM Reply', active: !!(client.facebook_connected||client.instagram_connected), desc:'Instantly replies to DMs on your social pages' },
        { label:'Review Request System',         active: true,                                             desc:'Sends Google review requests after each service' },
        { label:'Referral Program',              active: true,                                             desc:'Tracks customers who refer new business' },
        { label:'Monthly Reporting',             active: true,                                             desc:'Results update delivered every month' },
      ];

      document.getElementById('content').innerHTML = `
        <!-- Stats -->
        <div style="background:white;border-radius:16px;padding:18px;margin-bottom:12px;box-shadow:0 1px 8px rgba(0,0,0,0.06);">
          <div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;">${month} ${year} — Your Results</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
            ${stats.map(s=>`
              <div style="background:${s.bg};border-radius:12px;padding:14px;">
                <div style="font-size:22px;margin-bottom:4px;">${s.icon}</div>
                <div style="font-size:24px;font-weight:800;color:${s.color};">${s.value}</div>
                <div style="font-size:11px;color:#64748b;margin-top:2px;line-height:1.3;">${s.label}</div>
              </div>`).join('')}
          </div>
          <div style="margin-top:12px;background:linear-gradient(135deg,#1e3a5f,#2563eb);border-radius:12px;padding:16px;text-align:center;color:white;">
            <div style="font-size:24px;font-weight:800;">$0+</div>
            <div style="font-size:12px;color:#bfdbfe;margin-top:2px;">Estimated revenue recovered this month</div>
          </div>
        </div>

        <!-- Package -->
        <div style="background:white;border-radius:16px;padding:18px;margin-bottom:12px;box-shadow:0 1px 8px rgba(0,0,0,0.06);">
          <div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;">Your Plan</div>
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <div>
              <div style="font-size:16px;font-weight:700;color:#1e293b;">${pkg} Package</div>
              <div style="font-size:12px;color:#64748b;margin-top:2px;">Boroughwest Digital</div>
            </div>
            <div style="background:#eff6ff;color:#2563eb;font-weight:700;font-size:12px;padding:6px 12px;border-radius:20px;">Active ✓</div>
          </div>
        </div>

        <!-- Services -->
        <div style="background:white;border-radius:16px;padding:18px;margin-bottom:12px;box-shadow:0 1px 8px rgba(0,0,0,0.06);">
          <div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;">What's Active For You</div>
          ${services.map((s,i)=>`
            <div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;${i<services.length-1?'border-bottom:1px solid #f1f5f9;':''}">
              <div style="width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;background:${s.active?'#dcfce7':'#f1f5f9'};">
                <span style="font-size:11px;color:${s.active?'#16a34a':'#94a3b8'};">${s.active?'✓':'○'}</span>
              </div>
              <div>
                <div style="font-size:13px;font-weight:600;color:${s.active?'#1e293b':'#94a3b8'};">${s.label}</div>
                <div style="font-size:11px;color:#94a3b8;margin-top:2px;line-height:1.4;">${s.desc}</div>
              </div>
            </div>`).join('')}
        </div>

        <!-- Footer -->
        <div style="text-align:center;padding:8px 0 24px;">
          <p style="font-size:11px;color:#94a3b8;margin:0;">Questions? Contact Ferdinand at Boroughwest Digital</p>
          <p style="font-size:11px;color:#cbd5e1;margin:4px 0 0;">Manhattan, NYC · Local Business Automation</p>
        </div>
      `;
    }

    // --- INIT ---
    launchConfetti();

    const params = new URLSearchParams(window.location.search);
    // Support both ?client=ID and encoded data
    const clientId   = params.get('client');
    const bizName    = params.get('name');
    const pkg        = params.get('pkg');
    const hasTwilio  = params.get('twilio') === '1';
    const hasFB      = params.get('fb') === '1';

    // Show splash then reveal dashboard
    setTimeout(() => {
      document.getElementById('splash').style.display = 'none';
      const main = document.getElementById('main');
      main.style.display = 'block';
      main.classList.add('fade-in');
    }, 3400);

    if (bizName) {
      // Data passed via URL params (no API call needed — works on all devices)
      buildDashboard({
        business_name: decodeURIComponent(bizName),
        package: pkg ? decodeURIComponent(pkg) : 'Starter',
        twilio_phone_number: hasTwilio ? '1' : null,
        facebook_connected: hasFB,
        instagram_connected: false
      });
    } else {
      // Fallback: try API
      buildDashboard({ business_name: 'Your Business', package: 'Starter' });
      if (clientId) {
        fetch(`https://superagent-eedd9b5a.base44.app/functions/clientPortalPage?client=${clientId}`)
          .then(r => r.json())
          .then(data => { if (data && data.business_name) buildDashboard(data); })
          .catch(() => {});
      }
    }
  </script>
</body>
</html>
